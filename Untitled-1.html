<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple-Style Smooth Portfolio</title>
    <style>
        /* 基礎設定 */
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 橫向滑動軌道 */
        .slider {
            display: flex;
            gap: 40px;
            padding: 0 50px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100%;
            height: 600px;
            align-items: center;
            /* 隱藏滾動條 */
            scrollbar-width: none; 
        }
        .slider::-webkit-scrollbar {
            display: none;
        }

        /* 卡片容器 */
        .card {
            flex: 0 0 350px;
            height: 500px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            scroll-snap-align: center;
            
            /* --- 蘋果絲滑感核心 1：進場動畫 --- */
            opacity: 0;
            transform: translateY(60px) scale(0.95);
            /* 使用阻尼感極強的貝茲曲線，創造穩重感 */
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 當 JS 偵測到卡片進入畫面時，加上 .show 類別 */
        .card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* 圖片/影片初始狀態 */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            
            filter: blur(20px) brightness(0.6);
            transform: scale(1.15);
            
            /* --- 蘋果絲滑感核心 2：懸停動畫 --- */
            /* 0.8秒的絲滑過渡，沒有生硬的開始與結束 */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1),
                        filter 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            
            /* 呼叫 GPU 硬體加速，防止動畫掉幀卡頓 */
            will-change: transform, filter;
        }

        /* 懸停狀態 (Hover) */
        .card:hover img {
            filter: blur(0) brightness(1);
            transform: scale(1);
        }

        /* 卡片文字 */
        .card-content {
            position: absolute;
            bottom: 30px;
            left: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-content {
            opacity: 1;
            transform: translateY(0);
        }

        h3 { margin: 0 0 8px 0; font-size: 1.5rem; font-weight: 600; }
        p { margin: 0; font-size: 0.95rem; color: #a1a1a6; }
    </style>
</head>
<body>

    <div class="slider">
        <div class="card">
            <img src="https://picsum.photos/800/1000?random=1" alt="Project 1">
            <div class="card-content">
                <h3>Project Alpha</h3>
                <p>Digital Experience</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/800/1000?random=2" alt="Project 2">
            <div class="card-content">
                <h3>Project Beta</h3>
                <p>Visual Design</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/800/1000?random=3" alt="Project 3">
            <div class="card-content">
                <h3>Project Gamma</h3>
                <p>Web Development</p>
            </div>
        </div>
        
        <div class="card">
            <img src="https://picsum.photos/800/1000?random=4" alt="Project 4">
            <div class="card-content">
                <h3>Project Delta</h3>
                <p>Motion Graphics</p>
            </div>
        </div>
    </div>

    <script>
        // 設定監聽器：當元素進入畫面 15% 的時候觸發
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15 
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                // 如果卡片進入畫面
                if (entry.isIntersecting) {
                    // 加上 'show' 這個 class 來啟動 CSS 動畫
                    entry.target.classList.add('show');
                    // 動畫播完就停止監聽，節省效能
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // 把所有的 .card 都交給監聽器看管
        document.querySelectorAll('.card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
