<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under The Seat - Hsu YU CHIEN Portfolio</title>
    <style>
        /* 基礎設定 & 字體 */
        body {
            margin: 0;
            background-color: #0f0f0f; 
            color: #d0d0d0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 6vw; 
            max-width: 1400px; 
            width: 90%;
            padding: 80px 0;
            box-sizing: border-box;
            align-items: flex-start; 
        }

        /* =========================================
           1. 幻燈片播放器 (左側)
           ========================================= */
        .slideshow-col {
            flex: 1.4; 
            position: relative;
            
            /* --- 修改：讓動畫上升更慢、距離更長 --- */
            opacity: 0;
            transform: translateY(60px); /* 從更低的地方升起 */
            /* 動畫時間從 1.2s 改為 1.8s，變得更緩慢絲滑 */
            animation: elegantFadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .main-img-area {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 75%; 
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .main-img-area img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 0.6s ease; 
        }

        .main-img-area img.active {
            opacity: 1; 
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            transition: background 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .arrow:hover { background: rgba(255, 255, 255, 0.2); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        .thumbs-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 15px;
            margin-top: 20px;
        }

        .thumb {
            width: 100%;
            height: 0;
            padding-bottom: 75%; 
            border-radius: 6px;
            overflow: hidden;
            background-color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
            border: 2px solid transparent;
        }

        .thumb img {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.5); 
            transition: filter 0.3s ease;
        }

        .thumb.active { border-color: #555; }
        .thumb.active img, .thumb:hover img { filter: brightness(1); }

        /* =========================================
           2. 作品說明 (右側)
           ========================================= */
        .content-col {
            flex: 1; 
            position: sticky; 
            top: 80px;
            
            /* --- 修改：右側文字也變慢，並且稍微晚一點點才出發 --- */
            opacity: 0;
            transform: translateY(60px);
            animation: elegantFadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .content-col h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: #b0b0b0; 
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .content-col h2 {
            font-size: 1rem;
            font-weight: 400;
            color: #666;
            margin: 5px 0 5px 0; /* 調整了間距讓 h2, h3 更緊湊 */
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        /* 團隊成員名字的樣式 */
        .content-col h3 {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
            margin: 0 0 40px 0;
            letter-spacing: 2px;
        }

        .description p {
            font-size: 1.1rem;
            line-height: 1.8; 
            color: #a1a1a1;
            margin-bottom: 25px;
        }

        .back-home {
            display: inline-block;
            margin-top: 50px;
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 0;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .back-home:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        @keyframes elegantFadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; padding: 50px 0; }
            .slideshow-col, .content-col { flex: none; width: 100%; }
            .content-col { position: static; margin-top: 50px; }
            .content-col h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="slideshow-col">
            <div class="main-img-area">
                <button class="arrow arrow-left" id="prevBtn">&#10094;</button>
                <button class="arrow arrow-right" id="nextBtn">&#10095;</button>

                <img src="undertheseattitle.jpg" alt="Under The Seat 01" class="main-img active">
                <img src="undertheseat02.jpg" alt="Under The Seat 02" class="main-img">
                <img src="img3.jpg" alt="Under The Seat 03" class="main-img">
                <img src="img4.jpg" alt="Under The Seat 04" class="main-img">
                <img src="img5.jpg" alt="Under The Seat 05" class="main-img">
                <img src="img6.jpg" alt="Under The Seat 06" class="main-img">
            </div>

            <div class="thumbs-grid">
                <div class="thumb active"><img src="undertheseattitle.jpg" alt="Thumb 01"></div>
                <div class="thumb"><img src="undertheseat02.jpg" alt="Thumb 02"></div>
                <div class="thumb"><img src="img3.jpg" alt="Thumb 03"></div>
                <div class="thumb"><img src="img4.jpg" alt="Thumb 04"></div>
                <div class="thumb"><img src="img5.jpg" alt="Thumb 05"></div>
                <div class="thumb"><img src="img6.jpg" alt="Thumb 06"></div>
            </div>
        </div>

        <div class="content-col">
            <h1>Under The Seat</h1>
            <h2>© 2024 /  Animation Installation</h2>
            <h3>許妤謙、羅凱云、靳浩雅</h3>

            <div class="description">
                <p>以童年經歷為出發，呈現兒時校園裡師生、同儕之間因片面資訊所造成的誤會事件，及被掩蓋真相的不愉快、冤枉之情。</p>
                <p>一開始聚光在投幣機上。投幣之後，三個座位的聚光燈亮起，可以透過靠近座位看到該角色視角的動畫。</p>
                <p>在不同座位播放動畫，以不同角色視角觀看同一事件。不同的攝影機角度，所呈現的劇情細節、美術風格也有所不同。</p>
            </div>

            <a href="index.html" class="back-home">← Back to Home</a>
        </div>

    </div>

    <script>
        const mainImages = document.querySelectorAll('.main-img');
        const thumbs = document.querySelectorAll('.thumb');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        let currentIndex = 0; 

        function showSlide(index) {
            mainImages.forEach(img => img.classList.remove('active'));
            thumbs.forEach(thumb => thumb.classList.remove('active'));

            if (index >= mainImages.length) {
                currentIndex = 0; 
            } else if (index < 0) {
                currentIndex = mainImages.length - 1; 
            } else {
                currentIndex = index;
            }

            mainImages[currentIndex].classList.add('active');
            thumbs[currentIndex].classList.add('active');
        }

        prevBtn.addEventListener('click', () => {
            showSlide(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            showSlide(currentIndex + 1);
        });

        thumbs.forEach((thumb, index) => {
            thumb.addEventListener('click', () => {
                showSlide(index);
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') showSlide(currentIndex - 1);
            if (e.key === 'ArrowRight') showSlide(currentIndex + 1);
        });
    </script>
</body>
</html>
