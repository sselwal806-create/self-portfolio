<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hsu YU CHIEN - Portfolio</title>
    <style>
        body {
            margin: 0;
            background-color: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 灰色大字標題 */
        .hero {
            text-align: center;
            margin-top: 8vh;
            z-index: 200; 
            pointer-events: none; 
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 800;
            color: #b0b0b0; /* 灰色大字 */
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .hero h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #555; 
            letter-spacing: 10px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* 轉盤容器 */
        .wheel-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 正方形圖片卡片 */
        .card {
            position: absolute;
            width: 380px;  /* 正方形 */
            height: 380px; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            cursor: pointer;
            /* 變快了！動畫縮短為 0.4 秒 */
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 圖片模糊設定 */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 預設：模糊且變暗 */
            filter: blur(15px) brightness(0.4);
            transform: scale(1.15);
            transition: all 0.5s ease;
        }

        /* 只有帶有 .active 的卡片（正中央那張），圖片才會變清晰 */
        .card.active img {
            filter: blur(0) brightness(1);
            transform: scale(1);
        }

        /* 懸停時微微放大，增加互動感 */
        .card.active:hover img {
            transform: scale(1.05);
        }

        /* 縮小後的數字，永遠保持清晰 */
        .card-number {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 1.8rem; /* 字體變小，更精緻 */
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            z-index: 10;
            text-shadow: 1px 2px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Hsu YU CHIEN</h1>
        <h2>Portfolio</h2>
    </div>

    <div class="wheel-container">
        <a href="project1.html" class="card">
            <h3 class="card-number">#1</h3>
            <img src="https://picsum.photos/600/600?random=1" alt="作品 1">
        </a>
        <a href="project2.html" class="card">
            <h3 class="card-number">#2</h3>
            <img src="https://picsum.photos/600/600?random=2" alt="作品 2">
        </a>
        <a href="project3.html" class="card">
            <h3 class="card-number">#3</h3>
            <img src="https://picsum.photos/600/600?random=3" alt="作品 3">
        </a>
        <a href="project4.html" class="card">
            <h3 class="card-number">#4</h3>
            <img src="https://picsum.photos/600/600?random=4" alt="作品 4">
        </a>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const totalCards = cards.length;
        let activeIndex = 0; 
        let isScrolling = false; 

        function updateWheel() {
            cards.forEach((card, index) => {
                // 迴圈數學：計算每張卡片距離中心的「最短路徑」
                let diff = index - activeIndex;

                if (diff > Math.floor(totalCards / 2)) {
                    diff -= totalCards;
                } else if (diff < -Math.floor(totalCards / 2)) {
                    diff += totalCards;
                }

                // 物理位置計算
                let translateX = diff * 240; 
                let translateY = Math.abs(diff) * 40; 
                let rotateZ = diff * 8; 
                let scale = 1 - Math.abs(diff) * 0.15; 

                card.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${rotateZ}deg) scale(${scale})`;
                card.style.zIndex = 100 - Math.abs(diff);

                // 控制中心卡片的清晰與模糊
                if (diff === 0) {
                    card.classList.add('active'); // 在中間：掛上 active 讓 CSS 變清晰
                    card.style.opacity = 1;
                    card.style.pointerEvents = 'auto';
                } else {
                    card.classList.remove('active'); // 不在中間：拔掉 active 恢復模糊
                    
                    // 藏起背後的卡片，避免迴圈時穿幫
                    if (Math.abs(diff) > 1) {
                        card.style.opacity = 0;
                        card.style.pointerEvents = 'none';
                    } else {
                        card.style.opacity = 0.6; // 左右兩邊的卡片稍微變透明
                        card.style.pointerEvents = 'none';
                    }
                }
            });
        }

        updateWheel();

        window.addEventListener('wheel', (e) => {
            if (isScrolling) return;

            if (e.deltaY > 0) {
                // 往下滑：往下一張，並利用 % 達成無限迴圈
                activeIndex = (activeIndex + 1) % totalCards;
            } else {
                // 往上滑：往上一張，無限迴圈
                activeIndex = (activeIndex - 1 + totalCards) % totalCards;
            }

            updateWheel();

            // 煞車時間減半，現在只要 300 毫秒就能滑下一張
            isScrolling = true;
            setTimeout(() => {
                isScrolling = false;
            }, 300); 
        });
    </script>
</body>
</html>
