<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hsu YU CHIEN - Portfolio</title>
    <style>
        body {
            margin: 0;
            background-color: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           升級版：質感打字機高亮選單 (Intro Screen)
           ========================================= */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #050505; 
            z-index: 9999; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #intro-screen.slide-up {
            transform: translateY(-100%);
        }

        .intro-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .typing-box {
            display: inline-block;
            background-color: #fff;
            color: #000;
            font-family: monospace; 
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            padding: 15px 30px;
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(255,255,255,0.1); 
        }

        .typing-box::after {
            content: '|';
            color: #000;
            animation: blink 0.8s step-end infinite;
            font-weight: 300;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* =========================================
           主頁面：標題與轉盤 
           ========================================= */
        .hero {
            text-align: center;
            margin-top: 8vh;
            z-index: 50; 
            pointer-events: none; 
        }

        .hero h1 {
            font-size: 4.5rem; font-weight: 800; color: #b0b0b0; 
            margin: 0; letter-spacing: 5px; text-transform: uppercase;
            opacity: 0; transform: translateY(20px);
        }

        .hero h2 {
            font-size: 1.2rem; font-weight: 400; color: #555; 
            letter-spacing: 10px; margin-top: 5px; text-transform: uppercase;
            opacity: 0; transform: translateY(20px);
        }

        body.start-anim .hero h1 {
            animation: textFadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }
        body.start-anim .hero h2 {
            animation: textFadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        @keyframes textFadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .wheel-container {
            position: relative; flex-grow: 1; display: flex;
            justify-content: center; align-items: center;
        }

        .card {
            position: absolute; width: 380px; height: 380px; 
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            filter: blur(15px) brightness(0.4); transform: scale(1.15);
            transition: all 0.5s ease;
        }

        .card.active img { filter: blur(0) brightness(1); transform: scale(1); }
        .card.active:hover img { transform: scale(1.05); }

        .card-number {
            position: absolute; top: 20px; left: 25px; font-size: 1.8rem; 
            font-weight: 700; color: rgba(255, 255, 255, 0.9); margin: 0;
            z-index: 10; text-shadow: 1px 2px 10px rgba(0,0,0,0.8);
        }

        .card-name {
            position: absolute; bottom: 25px; left: 25px; right: 25px; 
            font-size: 1.4rem; font-weight: 800; color: rgba(255, 255, 255, 0.95);
            margin: 0; z-index: 10; text-shadow: 2px 4px 15px rgba(0,0,0,0.9); 
            line-height: 1.3;
        }

        .menu-toggle {
            position: fixed; top: 40px; right: 50px; width: 40px; height: 30px; z-index: 999; 
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
        }

        .menu-toggle span {
            display: block; height: 3px; width: 100%; background-color: #fff;
            border-radius: 3px; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: right center; 
        }

        .menu-toggle.active span:nth-child(1) { transform: rotate(-45deg) scaleX(1.1); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(45deg) scaleX(1.1); }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); 
            z-index: 900; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }

        .menu-overlay.active { opacity: 1; pointer-events: auto; }

        .menu-links { list-style: none; padding: 0; text-align: center; }
        .menu-links li { margin: 30px 0; overflow: hidden; }
        .menu-links a {
            display: inline-block; text-decoration: none; color: #555;
            font-size: 3.5rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 5px; transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s ease;
        }

        .menu-overlay.active .menu-links li:nth-child(1) a { transform: translateY(0); transition-delay: 0.1s; }
        .menu-overlay.active .menu-links li:nth-child(2) a { transform: translateY(0); transition-delay: 0.2s; }
        .menu-overlay.active .menu-links li:nth-child(3) a { transform: translateY(0); transition-delay: 0.3s; }
        .menu-links a:hover { color: #fff; }

        @media (max-width: 768px) {
            .typing-box { font-size: 1.2rem; padding: 10px 20px; } 
            .hero h1 { font-size: 2.8rem; }
            .hero h2 { font-size: 0.9rem; }
            .card { width: 300px; height: 300px; } 
            .menu-toggle { top: 30px; right: 30px; } 
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-container" id="typing-container">
            <div class="typing-box" id="typing-text"></div>
        </div>
    </div>


    <div class="menu-toggle" id="menuToggle">
        <span></span><span></span><span></span>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <ul class="menu-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>   
            <li><a href="mailto:sselwal@gmail.com">Contact</a></li>
        </ul>
    </div>

    <div class="hero">
        <h1>Hsu YU CHIEN</h1>
        <h2>Portfolio</h2>
    </div>

    <div class="wheel-container">
        <a href="project1.html" class="card">
            <h3 class="card-number">#1</h3>
            <h4 class="card-name">Under The Seat</h4>
            <img src="undertheseatheadtitle.jpg" alt="Under The Seat">
        </a>
        <a href="project2.html" class="card">
            <h3 class="card-number">#2</h3>
            <h4 class="card-name">幽靈之城</h4>
            <img src="https://picsum.photos/600/600?random=2" alt="幽靈之城">
        </a>
        <a href="project3.html" class="card">
            <h3 class="card-number">#3</h3>
            <h4 class="card-name">馬賽克，你的臉上</h4>
            <img src="馬賽克，你的臉上（劇照）.png" alt="馬賽克，你的臉上">
        </a>
        <a href="project4.html" class="card">
            <h3 class="card-number">#4</h3>
            <h4 class="card-name">Psyexplodie:混亂轉播</h4>
            <img src="表演01.png" alt="Psyexplodie:混亂轉播">
        </a>
        <a href="project5.html" class="card">
            <h3 class="card-number">#5</h3>
            <h4 class="card-name">插畫集</h4>
            <img src="Illustration01.PNG" alt="插畫集">
        </a>
        </div>

    <script>
        window.addEventListener('load', () => {
            const typingContainer = document.getElementById('typing-container');
            const typingText = document.getElementById('typing-text');
            const introScreen = document.getElementById('intro-screen');
            const textString = "Hi！here's my portfolio：）";
            let i = 0;

            setTimeout(() => {
                typingContainer.style.opacity = '1';
            }, 100);

            setTimeout(() => {
                function typeWriter() {
                    if (i < textString.length) {
                        typingText.innerHTML = textString.substring(0, i + 1);
                        i++;
                        setTimeout(typeWriter, 30); 
                    } else {
                        setTimeout(() => {
                            introScreen.classList.add('slide-up');
                            document.body.classList.add('start-anim');
                        }, 300);
                    }
                }
                typeWriter();
            }, 300);
        });

        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        const cards = document.querySelectorAll('.card');
        const totalCards = cards.length;
        let activeIndex = 0; 
        let isScrolling = false; 

        function updateWheel() {
            cards.forEach((card, index) => {
                let diff = index - activeIndex;
                if (diff > Math.floor(totalCards / 2)) diff -= totalCards;
                else if (diff < -Math.floor(totalCards / 2)) diff += totalCards;

                // 調整：拉寬 X 軸間距，確保放大時不會重疊
                let translateX = diff * 280; 
                let translateY = Math.abs(diff) * 40; 
                let rotateZ = diff * 8; 
                
                // 調整：選中的項目放大 (1.2倍)，兩側逐漸縮小
                let scale = diff === 0 ? 1.2 : 0.9 - Math.abs(diff) * 0.15; 

                card.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${rotateZ}deg) scale(${scale})`;
                card.style.zIndex = 100 - Math.abs(diff);

                if (diff === 0) {
                    card.classList.add('active'); 
                    card.style.opacity = 1;
                    card.style.pointerEvents = 'auto';
                } else {
                    card.classList.remove('active'); 
                    if (Math.abs(diff) > 1) {
                        card.style.opacity = 0;
                        card.style.pointerEvents = 'none';
                    } else {
                        card.style.opacity = 0.6; 
                        card.style.pointerEvents = 'none';
                    }
                }
            });
        }

        updateWheel();

        window.addEventListener('wheel', (e) => {
            if (isScrolling || menuOverlay.classList.contains('active')) return;
            if (e.deltaY > 0) activeIndex = (activeIndex + 1) % totalCards;
            else activeIndex = (activeIndex - 1 + totalCards) % totalCards;
            updateWheel();
            isScrolling = true;
            setTimeout(() => { isScrolling = false; }, 300); 
        });

        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        window.addEventListener('touchend', (e) => {
            if (isScrolling || menuOverlay.classList.contains('active')) return;
            let touchEndX = e.changedTouches[0].screenX, touchEndY = e.changedTouches[0].screenY;
            let xDiff = touchStartX - touchEndX, yDiff = touchStartY - touchEndY;

            if (Math.abs(xDiff) > 50 || Math.abs(yDiff) > 50) {
                if (Math.abs(xDiff) > Math.abs(yDiff)) {
                    if (xDiff > 0) activeIndex = (activeIndex + 1) % totalCards; 
                    else activeIndex = (activeIndex - 1 + totalCards) % totalCards; 
                } else {
                    if (yDiff > 0) activeIndex = (activeIndex + 1) % totalCards; 
                    else activeIndex = (activeIndex - 1 + totalCards) % totalCards; 
                }
                updateWheel();
                isScrolling = true;
                setTimeout(() => { isScrolling = false; }, 300); 
            }
        });
    </script>
</body>
</html>
