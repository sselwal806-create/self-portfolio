<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hsu YU CHIEN - Portfolio</title>
    <style>
        /* 基礎設定 */
        body {
            margin: 0;
            background-color: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 隱藏系統預設的上下滾動條 */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 需求 3：灰色的大字標題 --- */
        .hero {
            text-align: center;
            margin-top: 6vh;
            z-index: 200; /* 確保標題永遠在最上層 */
            pointer-events: none; /* 讓滑鼠點擊可以穿透標題點到卡片 */
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 800;
            color: #b0b0b0; /* 質感淺灰色 */
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .hero h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #666; /* 深灰色副標 */
            letter-spacing: 10px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* --- 需求 2：重疊轉盤容器 --- */
        .wheel-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 需求 1：正方形圖片卡片 --- */
        .card {
            position: absolute;
            width: 400px;
            height: 400px; /* 長寬一致，確保是正方形 */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            cursor: pointer;
            /* 轉盤切換時的順滑動畫 */
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 圖片設定：移除模糊，保持清晰 */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.05); /* 輕微放大增加點擊感 */
        }

        /* 圖片上的 #1 ~ #4 數字 */
        .card-number {
            position: absolute;
            top: 25px;
            left: 30px;
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            margin: 0;
            z-index: 10;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.6); /* 加強陰影讓數字在亮色圖片上也清楚 */
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Hsu YU CHIEN</h1>
        <h2>Portfolio</h2>
    </div>

    <div class="wheel-container">
        
        <a href="project1.html" class="card">
            <h3 class="card-number">#1</h3>
            <img src="https://picsum.photos/600/600?random=1" alt="作品 1">
        </a>

        <a href="project2.html" class="card">
            <h3 class="card-number">#2</h3>
            <img src="https://picsum.photos/600/600?random=2" alt="作品 2">
        </a>

        <a href="project3.html" class="card">
            <h3 class="card-number">#3</h3>
            <img src="https://picsum.photos/600/600?random=3" alt="作品 3">
        </a>

        <a href="project4.html" class="card">
            <h3 class="card-number">#4</h3>
            <img src="https://picsum.photos/600/600?random=4" alt="作品 4">
        </a>

    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        let activeIndex = 0; // 記錄當前在正中央的是哪一張卡片
        let isScrolling = false; // 煞車系統：防止滾輪一次滑太多張

        // 計算卡片位置的函式
        function updateWheel() {
            cards.forEach((card, index) => {
                // 算出每張卡片距離「中心點 (activeIndex)」有多遠
                // diff = 0 代表正中央，diff = 1 代表右邊一張，diff = -1 代表左邊一張
                let diff = index - activeIndex;

                // 核心數學公式：製造扇形轉盤感
                let translateX = diff * 220; // 左右拉開的距離
                let translateY = Math.abs(diff) * 60; // 越旁邊的往下沉
                let rotateZ = diff * 12; // 加上微微的傾斜角度
                let scale = 1 - Math.abs(diff) * 0.15; // 越旁邊的越小

                // 執行變形與層級排序 (確保中間那張永遠在最上層)
                card.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${rotateZ}deg) scale(${scale})`;
                card.style.zIndex = 100 - Math.abs(diff);

                // 如果離中心太遠 (超過2張)，就讓它變透明隱藏
                if (Math.abs(diff) > 2) {
                    card.style.opacity = 0;
                    card.style.pointerEvents = 'none'; // 隱藏時不可點擊
                } else {
                    card.style.opacity = 1 - Math.abs(diff) * 0.2; // 旁邊的稍微變暗一點點凸顯中央
                    card.style.pointerEvents = 'auto';
                }
            });
        }

        // 網頁一打開先排好位置
        updateWheel();

        // 監聽滑鼠滾輪事件
        window.addEventListener('wheel', (e) => {
            // 如果還在切換動畫中，不接受新的滾動指令
            if (isScrolling) return;

            if (e.deltaY > 0) {
                // 往下滑，前進下一張
                activeIndex++;
            } else {
                // 往上滑，退回上一張
                activeIndex--;
            }

            // 限制範圍：不能小於 0，也不能大於最後一張的編號
            activeIndex = Math.max(0, Math.min(activeIndex, cards.length - 1));

            updateWheel();

            // 踩下煞車，0.6秒後才能滑下一張 (需與 CSS 的 transition 時間配合)
            isScrolling = true;
            setTimeout(() => {
                isScrolling = false;
            }, 600);
        });
    </script>
</body>
</html>
