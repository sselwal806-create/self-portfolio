<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插畫集 - Gallery</title>
    <style>
        /* =========================================
           1. 基礎設定與標題
           ========================================= */
        body {
            margin: 0;
            background-color: #0f0f0f; /* 質感黑底，最能襯托插畫色彩 */
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 50px 20px;
            position: relative; /* 確保左上角的返回鍵能正確定位 */
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 1s ease forwards;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin: 0;
            color: #e0e0e0;
        }

        .header p {
            color: #888;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* =========================================
           2. 瀑布流相簿排版 (Masonry Layout)
           ========================================= */
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            column-count: 4; 
            column-gap: 20px; 
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px; 
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            
            opacity: 0;
            transform: translateY(20px);
            animation: elegantFadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05); 
            filter: brightness(1.2); 
        }

        /* =========================================
           3. 點擊放大功能 (Lightbox)
           ========================================= */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 3rem;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s;
            line-height: 1;
        }

        .lightbox-close:hover {
            color: #aaa;
        }

        /* =========================================
           4. 新增：返回首頁按鈕
           ========================================= */
        .back-btn {
            position: absolute;
            top: 50px;
            left: 50px;
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            z-index: 100;
            animation: fadeIn 1s ease forwards;
        }

        .back-btn:hover {
            color: #fff;
        }

        @keyframes elegantFadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* =========================================
           5. RWD 響應式設計 (適應手機與平板)
           ========================================= */
        @media (max-width: 1024px) {
            .gallery { column-count: 3; } 
        }
        @media (max-width: 768px) {
            .gallery { column-count: 2; } 
            .back-btn { top: 20px; left: 20px; font-size: 0.8rem; } /* 手機版返回鍵縮小並靠邊 */
            .header { margin-top: 40px; } /* 手機版標題往下挪，避免跟返回鍵打架 */
        }
        @media (max-width: 480px) {
            .gallery { column-count: 1; } 
            .header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="header">
        <h1>插畫集</h1>
        <p>Illustrations & Sketches</p>
    </div>

    <div class="gallery">
        <div class="gallery-item"><img src="Illustration01.PNG" alt="插畫 1"></div>
        <div class="gallery-item"><img src="Illustration02.PNG" alt="插畫 2"></div>
        <div class="gallery-item"><img src="Illustration03.PNG" alt="插畫 3"></div>
        <div class="gallery-item"><img src="Illustration04.PNG" alt="插畫 4"></div>
        <div class="gallery-item"><img src="Illustration05.PNG" alt="插畫 5"></div>
        <div class="gallery-item"><img src="Illustration06.PNG" alt="插畫 6"></div>
        <div class="gallery-item"><img src="Illustration07.PNG" alt="插畫 7"></div>
        <div class="gallery-item"><img src="Illustration08.PNG" alt="插畫 8"></div>
        <div class="gallery-item"><img src="Illustration09.PNG" alt="插畫 9"></div>
        <div class="gallery-item"><img src="Illustration10.PNG" alt="插畫 10"></div>
        <div class="gallery-item"><img src="Illustration11.PNG" alt="插畫 11"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img src="" alt="放大顯示的插畫" id="lightboxImg">
    </div>

    <script>
        const galleryItems = document.querySelectorAll('.gallery-item img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');

        galleryItems.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; 
            });
        });

        lightboxClose.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; 
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
